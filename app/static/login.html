<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIFE-MXN | Iniciar sesión</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 48px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 18px; padding: 10px 16px; font-weight: 600; cursor: pointer; }
    .err { color: #b91c1c; margin-top: 12px; }
    .hint { color: #64748b; font-size: 14px; margin-top: 16px; }
    a { color: #0b6ead; }
  </style>
</head>
<body>
  <h1>Iniciar sesión</h1>
  <p id="logged-out-msg" class="hint" style="color:#0f766e;display:none;" hidden></p>
  <p class="hint">Tras entrar, el panel usará su token JWT. Si no inicia sesión, el servidor puede seguir inyectando la API key en <code>/ui</code> como hasta ahora.</p>
  <form id="login-form">
    <label>Usuario
      <input name="username" autocomplete="username" required />
    </label>
    <label>Contraseña
      <input name="password" type="password" autocomplete="current-password" required />
    </label>
    <button type="submit">Entrar</button>
    <p id="msg" class="err" hidden></p>
  </form>
  <p class="hint"><a href="/ui">Volver al panel</a> · <a href="/docs">Documentación API</a></p>
  <script>
    const API_BASE = __API_V1_PREFIX__;
    (function () {
      const p = new URLSearchParams(window.location.search);
      if (p.get("logged_out") === "1") {
        const el = document.getElementById("logged-out-msg");
        if (el) {
          el.textContent = "Sesión cerrada. Puede entrar de nuevo o volver al panel (el servidor seguirá usando API key si no hay JWT).";
          el.hidden = false;
          el.style.display = "block";
        }
      }
    })();
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.hidden = true;
      const fd = new FormData(e.target);
      const body = new URLSearchParams();
      body.append("username", (fd.get("username") || "").trim());
      body.append("password", fd.get("password") || "");
      let r;
      try {
        r = await fetch(API_BASE + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
          signal: AbortSignal.timeout(25_000),
        });
      } catch (err) {
        const name = err && err.name;
        msg.textContent =
          name === "TimeoutError" || name === "AbortError"
            ? "El servidor no respondio a tiempo. Revise que uvicorn este en marcha y MySQL accesible (.env)."
            : "No se pudo contactar al servidor.";
        msg.hidden = false;
        return;
      }
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        const d = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail || data);
        msg.textContent = d || "Error al iniciar sesion";
        msg.hidden = false;
        return;
      }
      sessionStorage.setItem("sife_access_token", data.access_token);
      const next = new URLSearchParams(window.location.search).get("next") || "/ui";
      window.location.href = next.startsWith("/") ? next : "/ui";
    });
  </script>
</body>
</html>
